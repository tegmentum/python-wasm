schema = "tegmentum:python-wasm/profile@0.1.0"

# CPython 3.13.9 build profile. Mirrors 3.14-current options exactly —
# only the Python version differs. Useful for parity testing the cap
# layer against the previous stable Python.
#
# Known stdlib delta from 3.14: 3.13 still ships Lib/_compression.py
# (BaseStream helpers used by bz2/gzip/lzma); 3.14 moved them to
# Lib/compression/_common/_streams.py. Some of our overlays (notably
# bz2.py, lzma.py, gzip-related) may need a 3.13 variant if the
# import paths they reach for don't match. See
# docs/pylon-pyforge.md "Stdlib layout changes between minor versions".

[meta]
description = "CPython 3.13.9 — same options as 3.14-current."

[python]
implementation = "cpython"
version = "3.13.9"
git_tag = "v3.13.9"
source_dir = "cpython-3.13"

[toolchain]
wasi_sdk_version = "33.0"
wasi_sdk_dir = "wasi-sdk-33.0-arm64-macos"
host_triple = "wasm32-wasip2"

[build]
static_openssl = false
static_zlib = false
with_v86_posix = true

[capabilities]
compression_multiplexer = "${HOME}/git/compression-multiplexer/target/wasm32-wasip2/release/compression_multiplexer.wasm"
zlib_component = "${HOME}/git/zlib-wasm/build/bin/zlib.component.wasm"
crypto_hash_multiplexer = "${HOME}/git/crypto-hash-multiplexer/target/wasm32-wasip2/release/crypto_hash_multiplexer.wasm"
hashing_multiplexer = "${HOME}/git/hashing-multiplexer/target/wasm32-wasip2/release/hashing_multiplexer.wasm"
openssl_component = "${HOME}/git/openssl-wasm/build/openssl-component.wasm"
sqlite_component = "${HOME}/git/sqlite-wasm/build/sqlite-core.wasm"
password_hash_multiplexer = "${HOME}/git/password-hash-multiplexer/target/wasm32-wasip2/release/password_hash_multiplexer.wasm"
v86_posix_component = "${HOME}/git/v86/target/wasm32-wasip2/release/v86_posix_stub.wasm"

[output]
build_dir = "build/3.13-current"
