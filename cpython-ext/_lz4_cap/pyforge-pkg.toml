schema = "tegmentum:pylon-pyforge/pkg@0.1.0"

# lz4 codec extension. Imports lz4-wasm's per-codec WIT directly
# (lz4:compression@0.1.0). Pattern A static linkage.
#
# lz4 isn't in CPython's stdlib; this extension exposes the codec as
# an importable `_lz4_cap` C module for consumers that want lz4 framing
# without bringing in the python-lz4 PyPI package's native deps.

[package]
name = "lz4-cap"
version = "0.1.0"
description = "lz4 codec extension over lz4-wasm (non-stdlib; raw + framed)"
pattern = "A"

[extension]
srcdir = "_lz4_cap"
module_name = "_lz4_cap"
c_file = "_lz4_capmodule.c"
wit_dir = "wit"
gen_dir = "gen"
gen_import_c = "lz4_cap_import.c"
gen_import_obj = "lz4_cap_import_component_type.o"

[[capabilities.required]]
interface = "lz4:compression/simple"
version = "0.1.0"

[[capabilities.required]]
interface = "lz4:compression/info"
version = "0.1.0"

# No stdlib overlay — _lz4_cap is the importable surface.

[gating]
include_forges = []
exclude_forges = []
