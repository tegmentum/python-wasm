schema = "tegmentum:pylon-pyforge/pkg@0.1.0"

# Cryptographic hashes (sha256, sha512, blake2, …) served by
# tegmentum:crypto-hash-multiplexer via Pattern A cpython-ext static
# linkage. See ../../docs/pyforge-pkg-spec.md.
#
# Phase 5.1 redesign (current):
#
# Discovery: CPython's builtin _sha2/_sha3/_blake2/_md5/_sha1 C extensions
# already cover all 14 stdlib hash algorithms (sha224, sha3_224/384,
# shake_128/256 included). Stdlib hashlib naturally falls back to them
# when `_hashlib` (the OpenSSL extension) is missing. So the original
# Phase 5.1 plan — overlaying Lib/hashlib.py to cap-route through
# _crypto_hash — was unnecessary.
#
# Instead we ship a minimal Lib/_hashlib.py providing:
#   * compare_digest, openssl_<algo> aliases (delegate to builtins)
#   * stubs for hmac_new/hmac_digest (raise UnsupportedDigestmodError
#     so stdlib hmac falls through to its builtin _hmac path)
#   * pbkdf2_hmac in pure Python (RFC 8018)
#
# scrypt is NOT provided — pure-Python scrypt at production parameters
# (N=16384) is impractically slow. Code that needs it should use the
# `cryptography` library, rebuild with STATIC_OPENSSL=1, or wait for
# a proper KDF cap component.
#
# The _crypto_hash cpython-ext extension itself is retained for
# component-to-component handoffs and as a demonstration of the
# tegmentum:crypto-hash-multiplexer integration — Python users go
# through stdlib hashlib (which doesn't use it).

[package]
name = "crypto-hash"
version = "0.1.0"
description = "hashlib-shape cryptographic hashes over the crypto-hash-multiplexer capability"
pattern = "A"

[extension]
srcdir = "_crypto_hash"
module_name = "_crypto_hash"
c_file = "_crypto_hashmodule.c"
wit_dir = "wit"
gen_dir = "gen"
gen_import_c = "crypto_hash_import.c"
gen_import_obj = "crypto_hash_import_component_type.o"

[[capabilities.required]]
interface = "tegmentum:crypto-hash-multiplexer/hash-dispatcher"
version = "0.1.0"

# _hashlib — pure-Python `_hashlib` providing pbkdf2_hmac and the surface
# stdlib hashlib + hmac assume is there. Stdlib hashlib doesn't override
# (its builtin fallbacks cover all 14 algorithms); _hashlib.py exists
# solely to expose pbkdf2_hmac and stub compare_digest / hmac_new.
[[provides]]
module = "_hashlib"
shim = "_hashlib.py"
dest = "Lib/_hashlib.py"
purpose = "Phase 5.1: pure-Python pbkdf2_hmac so stdlib hashlib exposes it (no static OpenSSL)"
version = "0.1.0"
offload = [
  { callable = "pbkdf2_hmac", doc = "PBKDF2-HMAC key derivation (RFC 8018).", codecs = ["msgpack", "json"] },
]

[gating]
include_forges = []
exclude_forges = []
