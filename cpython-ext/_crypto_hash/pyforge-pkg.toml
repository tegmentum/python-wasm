schema = "tegmentum:pylon-pyforge/pkg@0.1.0"

# Cryptographic hashes (sha256, sha512, blake2, …) served by
# tegmentum:crypto-hash-multiplexer via Pattern A cpython-ext static
# linkage. See ../../docs/pyforge-pkg-spec.md.
#
# Phase 5.1 (committed): hashlib.py is a self-contained replacement that
# routes the stdlib hashlib API through _crypto_hash. Installed AS
# Lib/hashlib.py by `make install-python-shims` so plain `import hashlib`
# uses the capability path (the static _hashlib is unavailable in the
# default build — set STATIC_OPENSSL=1 to re-enable it).
#
# hashlib_capability.py is kept as a backwards-compat shim for code that
# explicitly did `import hashlib_capability; install()`. It still works:
# its monkey-patches end up touching the new self-contained hashlib (no
# harm done; routing is already correct).

[package]
name = "crypto-hash"
version = "0.1.0"
description = "hashlib-shape cryptographic hashes over the crypto-hash-multiplexer capability"
pattern = "A"

[extension]
srcdir = "_crypto_hash"
module_name = "_crypto_hash"
c_file = "_crypto_hashmodule.c"
wit_dir = "wit"
gen_dir = "gen"
gen_import_c = "crypto_hash_import.c"
gen_import_obj = "crypto_hash_import_component_type.o"

[[capabilities.required]]
interface = "tegmentum:crypto-hash-multiplexer/hash-dispatcher"
version = "0.1.0"

# hashlib — self-contained replacement for stdlib hashlib. Routes the
# stdlib API through _crypto_hash for the 9 multiplexer-supported algos
# (md5, sha1, sha256, sha384, sha512, sha3_256, sha3_512, blake2b,
# blake2s) and raises NotImplementedError for sha224 / sha3_224 /
# shake_* / pbkdf2_hmac / scrypt (gaps documented in the shim).
[[provides]]
module = "hashlib"
shim = "hashlib.py"
dest = "Lib/hashlib.py"
purpose = "Phase 5.1: cap-route hashlib through _crypto_hash (retires static _hashlib)"
version = "0.1.0"
offload = [
  { callable = "new",       doc = "Construct a hasher by algorithm name.",  codecs = ["msgpack", "json"] },
  { callable = "sha256",    doc = "SHA-256 hasher constructor.",            codecs = ["msgpack", "json"] },
  { callable = "sha512",    doc = "SHA-512 hasher constructor.",            codecs = ["msgpack", "json"] },
  { callable = "blake2b",   doc = "BLAKE2b hasher constructor.",            codecs = ["msgpack", "json"] },
]

# hashlib_capability — opt-in backwards-compat shim. Kept installed for
# code that explicitly does `import hashlib_capability; install()`. The
# install() call now no-ops against the already-routing Lib/hashlib.py.
[[provides]]
module = "hashlib_capability"
shim = "hashlib_capability.py"
dest = "Lib/hashlib_capability.py"
purpose = "Backwards-compat shim for code that opted in via `import hashlib_capability` (Phase 5.1: superseded by Lib/hashlib.py auto-install)"
version = "0.1.0"

[gating]
include_forges = []
exclude_forges = []
