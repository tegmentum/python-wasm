schema = "tegmentum:pylon-pyforge/pkg@0.1.0"

# Password-hash / KDF dispatcher (pbkdf2, scrypt, argon2) over the password-hash-multiplexer cap
# Generated by `pylon pkg new _kdf_cap`.

[package]
name = "kdf-cap"
version = "0.1.0"
description = "Password-hash / KDF dispatcher (pbkdf2, scrypt, argon2) over the password-hash-multiplexer cap"
pattern = "A"

[extension]
srcdir = "_kdf_cap"
module_name = "_kdf_cap"
c_file = "_kdf_capmodule.c"
wit_dir = "wit"
gen_dir = "gen"
gen_import_c = "kdf_cap_import.c"
gen_import_obj = "kdf_cap_import_component_type.o"

[[capabilities.required]]
interface = "tegmentum:password-hash-multiplexer/password-dispatcher"
version = "0.1.0"

# No [[provides]] entries yet. Add one per Python module this extension
# exposes — either via a Lib/ shim (set shim+dest) or direct-C (omit
# both, set module = "_kdf_cap"). See ../../docs/pyforge-pkg-spec.md §3.5.

[gating]
include_forges = []
exclude_forges = []
