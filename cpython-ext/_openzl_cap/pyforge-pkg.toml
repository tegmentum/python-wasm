schema = "tegmentum:pylon-pyforge/pkg@0.1.0"

# openzl codec extension. Imports openzl-wasm's per-codec WIT directly
# (openzl:compression@0.1.0). Pattern A static linkage.
#
# openzl isn't in CPython's stdlib; this extension exposes the codec
# as an importable `_openzl_cap` C module. Required by clients that
# want openzl's training/profile workflow (see openzl-wasm README).

[package]
name = "openzl-cap"
version = "0.1.0"
description = "openzl codec extension over openzl-wasm (non-stdlib; profile-driven)"
pattern = "A"

[extension]
srcdir = "_openzl_cap"
module_name = "_openzl_cap"
c_file = "_openzl_capmodule.c"
wit_dir = "wit"
gen_dir = "gen"
gen_import_c = "openzl_cap_import.c"
gen_import_obj = "openzl_cap_import_component_type.o"

[[capabilities.required]]
interface = "openzl:compression/simple"
version = "0.1.0"

[[capabilities.required]]
interface = "openzl:compression/info"
version = "0.1.0"

# No stdlib overlay — _openzl_cap is the importable surface.

[gating]
include_forges = []
exclude_forges = []
