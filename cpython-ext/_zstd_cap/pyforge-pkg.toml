schema = "tegmentum:pylon-pyforge/pkg@0.1.0"

# Zstandard codec extension. Imports zstd-wasm's per-codec WIT directly
# (zstd:compression@0.1.0). Pattern A static linkage; stdlib's
# `compression.zstd` (new in 3.14) is overlaid with the
# cpython-ext/_compression/zstd.py shim.
#
# Surface: compress/decompress, dict_id, compress_with_dict /
# decompress_with_dict, get_frame_size, train_dict, finalize_dict,
# compress_advanced / decompress_advanced (per-frame parameter table),
# compress_advanced_with_dict / decompress_advanced_with_dict.

[package]
name = "zstd-cap"
version = "0.1.0"
description = "zstd codec extension over zstd-wasm (replaces the missing-on-wasi _zstd C extension; full advanced API)"
pattern = "A"

[extension]
srcdir = "_zstd_cap"
module_name = "_zstd_cap"
c_file = "_zstd_capmodule.c"
wit_dir = "wit"
gen_dir = "gen"
gen_import_c = "zstd_cap_import.c"
gen_import_obj = "zstd_cap_import_component_type.o"

[[capabilities.required]]
interface = "zstd:compression/simple"
version = "0.1.0"

[[capabilities.required]]
interface = "zstd:compression/streaming"
version = "0.1.0"

[[capabilities.required]]
interface = "zstd:compression/info"
version = "0.1.0"

[[capabilities.required]]
interface = "zstd:compression/advanced"
version = "0.1.0"

# compression.zstd is a 3.14+ stdlib module; install-python-shims
# silently skips this on Python < 3.14.
[[provides]]
module = "compression.zstd"
shim = "../_compression/zstd.py"
dest = "Lib/compression/zstd/__init__.py"
purpose = "Tier A: cap-route compression.zstd through _zstd_cap (skipped on Python < 3.14)"
version = "0.1.0"

[gating]
include_forges = []
exclude_forges = []
