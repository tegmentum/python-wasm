schema = "tegmentum:pylon-pyforge/pkg@0.1.0"

# Stdlib compression modules (zlib, bz2, lzma, compression.zstd) served
# by tegmentum:compression-multiplexer via Pattern A cpython-ext static
# linkage. See ../../docs/pyforge-pkg-spec.md.

[package]
name = "compression"
version = "0.1.0"
description = "Stdlib compression modules over the compression-multiplexer capability"
pattern = "A"

[extension]
srcdir = "_compression"
module_name = "_compress_cap"
c_file = "_compressionmodule.c"
wit_dir = "wit"
gen_dir = "gen"
gen_import_c = "compression_import.c"
gen_import_obj = "compression_import_component_type.o"

[[capabilities.required]]
interface = "tegmentum:compression-multiplexer/compression-dispatcher"
version = "0.1.0"

[[capabilities.required]]
interface = "tegmentum:compression-multiplexer/zstd-extras"
version = "0.1.0"

# zlib — the original Tier A migration and the registry's lead entry.
[[provides]]
module = "zlib"
shim = "zlib.py"
dest = "Lib/zlib.py"
purpose = "Tier A: cap-route zlib through _compress_cap (retires static libz)"
version = "0.1.0"
offload = [
  { callable = "compress",   doc = "Compress bytes to zlib format (RFC 1950) via the DEFLATE codec.", codecs = ["msgpack", "json"] },
  { callable = "decompress", doc = "Decompress zlib (RFC 1950) or raw DEFLATE (negative wbits) bytes.", codecs = ["msgpack", "json"] },
  { callable = "crc32",      doc = "CRC-32 checksum.",   codecs = ["msgpack", "json"] },
  { callable = "adler32",    doc = "Adler-32 checksum.", codecs = ["msgpack", "json"] },
]

# bz2 — in-process only for now; no offload demand has surfaced.
[[provides]]
module = "bz2"
shim = "bz2.py"
dest = "Lib/bz2.py"
purpose = "Tier A: cap-route bz2 through _compress_cap.bzip2_*"
version = "0.1.0"

# lzma — in-process only; ditto.
[[provides]]
module = "lzma"
shim = "lzma.py"
dest = "Lib/lzma.py"
purpose = "Tier A: cap-route lzma through _compress_cap.lzma_* (FORMAT_XZ)"
version = "0.1.0"

# compression.zstd — new stdlib path (3.14+); in-process only.
[[provides]]
module = "compression.zstd"
shim = "zstd.py"
dest = "Lib/compression/zstd/__init__.py"
purpose = "Tier A: cap-route compression.zstd through _compress_cap.zstd_*"
version = "0.1.0"

# No forge gating — both browser and v86 forges include compression.
[gating]
include_forges = []
exclude_forges = []
