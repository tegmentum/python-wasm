schema = "tegmentum:pylon-pyforge/pkg@0.1.0"

# lzma/xz codec extension. Imports lzma-wasm's per-codec WIT directly
# (lzma:compression@0.1.0). Pattern A static linkage; stdlib `lzma`
# is overlaid with cpython-ext/_compression/lzma.py.

[package]
name = "lzma-cap"
version = "0.1.0"
description = "lzma codec extension over lzma-wasm (replaces the missing-on-wasi _lzma C extension)"
pattern = "A"

[extension]
srcdir = "_lzma_cap"
module_name = "_lzma_cap"
c_file = "_lzma_capmodule.c"
wit_dir = "wit"
gen_dir = "gen"
gen_import_c = "lzma_cap_import.c"
gen_import_obj = "lzma_cap_import_component_type.o"

[[capabilities.required]]
interface = "lzma:compression/simple"
version = "0.1.0"

[[capabilities.required]]
interface = "lzma:compression/streaming"
version = "0.1.0"

[[capabilities.required]]
interface = "lzma:compression/info"
version = "0.1.0"

[[capabilities.required]]
interface = "lzma:compression/advanced"
version = "0.1.0"

[[provides]]
module = "lzma"
shim = "../_compression/lzma.py"
dest = "Lib/lzma.py"
purpose = "Tier A: cap-route lzma through _lzma_cap (FORMAT_XZ)"
version = "0.1.0"

[gating]
include_forges = []
exclude_forges = []
